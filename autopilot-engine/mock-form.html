<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outreach Test Form - Local Sandbox</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f1f5f9; padding: 40px; }
        .form-card { background: #1e293b; border-radius: 8px; padding: 30px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #94a3b8; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #334155; border-radius: 4px; background: #0f172a; color: #fff; font-size: 1rem; }
        button { background: #2563eb; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button:hover { background: #1d4ed8; }
        .success { display: none; color: #10b981; font-weight: bold; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2 style="text-align: center; margin-bottom: 20px;">Contact Guest Editor</h2>
        <form id="contact-form" onsubmit="event.preventDefault(); document.getElementById('success-msg').style.display='block';">
            <div class="field">
                <label>Your Name</label>
                <input type="text" id="full-name" name="name" placeholder="John Doe">
            </div>
            <div class="field">
                <label>Email Address</label>
                <input type="email" id="email" name="contact-email" placeholder="example@domain.com">
            </div>
            <div class="field">
                <label>Website URL</label>
                <input type="text" id="website" name="url" placeholder="https://example.com">
            </div>
            <div class="field">
                <label>Message Pitch</label>
                <textarea id="message" name="message-body" rows="5" placeholder="Write your pitch here..."></textarea>
            </div>
            <button type="submit">Send Pitch</button>
        </form>
        <div class="success" id="success-msg">✔️ Proposal Sent Successfully!</div>
    </div>
</body>
</html>
